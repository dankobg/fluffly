components:
  responses:
    UnexpectedError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GenericError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFoundError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    EmptyResponse:
      description: >-
        Empty responses are sent when, for example, resources are deleted. The
        HTTP status code for empty responses is

        typically 201 or 204

  parameters:
    PaginationPage:
      in: query
      name: page
      required: false
      schema:
        $ref: "#/components/schemas/PaginationPage"
      description: Page number (1-based)
    PaginationPageSize:
      in: query
      name: page_size
      required: false
      schema:
        $ref: "#/components/schemas/PaginationPageSize"
      description: Number of items per page

