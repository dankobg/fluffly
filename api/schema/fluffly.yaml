openapi: 3.0.2
servers:
  - url: "http://localhost:6969/api/v1"
    description: Fluffly development server
info:
  version: 1.0.0
  title: Fluffly API
tags:
  - name: fluffly
    description: Everything about fluffly
paths:
  /health/alive:
    get:
      operationId: getHealthAlive
      summary: Check if server is healthy
      description: Checks if the server is healthy
      tags:
        - fluffly
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Healthy"
        default:
          $ref: "#/components/responses/UnexpectedError"
  /health/ready:
    get:
      operationId: getHealthReady
      summary: Check if server is ready
      description: Checks if the server is ready
      tags:
        - fluffly
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ready"
        default:
          $ref: "#/components/responses/UnexpectedError"
  /countries:
    get:
      operationId: listCountries
      summary: List countries
      description: List countries
      tags:
        - fluffly
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationPageSize"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Country"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        default:
          $ref: "#/components/responses/UnexpectedError"
    post:
      operationId: createCountry
      summary: Create country
      description: Create a country
      tags:
        - fluffly
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCountryBody"
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
  "/countries/{id}":
    get:
      operationId: getCountry
      summary: Get country by id
      description: Return a specific country by id
      tags:
        - fluffly
      parameters:
        - description: The country id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
          description: identitySchema
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
    patch:
      operationId: updateCountry
      summary: Update country
      description: Update a country
      tags:
        - fluffly
      parameters:
        - description: The country id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCountryBody"
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
    delete:
      operationId: deleteCountry
      summary: Delete country by id
      description: Delete a specific country by id
      tags:
        - fluffly
      parameters:
        - description: The country id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
  /organizations:
    get:
      operationId: listOrganizations
      summary: List organizations
      description: List organizations that help animals
      tags:
        - fluffly
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationPageSize"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        default:
          $ref: "#/components/responses/UnexpectedError"
    post:
      operationId: createOrganization
      summary: Create organization
      description: Create an organization that helps adopt animals
      tags:
        - fluffly
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationBody"
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
  "/organizations/{id}":
    get:
      operationId: getOrganization
      summary: Get organization by id
      description: Return a specific organization by id
      tags:
        - fluffly
      parameters:
        - description: The organization id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
          description: identitySchema
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
    patch:
      operationId: updateOrganization
      summary: Update organization
      description: Update an organization that helps adopt animals
      tags:
        - fluffly
      parameters:
        - description: The organization id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationBody"
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
    delete:
      operationId: deleteOrganization
      summary: Delete organization by id
      description: Delete a specific organization by id
      tags:
        - fluffly
      parameters:
        - description: The organization id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
  /animals:
    get:
      operationId: listAnimals
      summary: List animals
      description: List animals that are available for adoption
      tags:
        - fluffly
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationPageSize"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Animal"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        default:
          $ref: "#/components/responses/UnexpectedError"
    post:
      operationId: createAnimal
      summary: Create animal
      description: Create an animal that can be adopted
      tags:
        - fluffly
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnimalBody"
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
  "/animals/{id}":
    get:
      operationId: getAnimal
      summary: Get animal by id
      description: Return a specific animal by id
      tags:
        - fluffly
      parameters:
        - description: The animal id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
          description: identitySchema
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
    patch:
      operationId: updateAnimal
      summary: Update animal
      description: Update an animal that helps adopt animals
      tags:
        - fluffly
      parameters:
        - description: The animal id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnimalBody"
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
    delete:
      operationId: deleteAnimal
      summary: Delete animal by id
      description: Delete a specific animal by id
      tags:
        - fluffly
      parameters:
        - description: The animal id
          in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
  /schemas:
    get:
      description: Returns a list of all identity schemas currently in use.
      operationId: listIdentitySchemas
      parameters:
        - description: >-
            Page Size
          in: query
          name: page_size
          schema:
            default: 250
            format: int64
            maximum: 500
            minimum: 1
            type: integer
        - description: >-
            Next Page Token
          in: query
          name: page_token
          schema:
            default: "1"
            minimum: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentitySchemas"
          description: List Identity JSON Schemas Response
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Get all Identity Schemas
      tags:
        - fluffly
  "/schemas/{id}":
    get:
      description: Return a specific identity schema.
      operationId: getIdentitySchema
      parameters:
        - description: ID must be set to the ID of schema you want to get
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentitySchema"
          description: identitySchema
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Get Identity JSON Schema
      tags:
        - fluffly
  /courier/messages:
    get:
      description: Lists all messages by given status and recipient.
      operationId: listCourierMessages
      parameters:
        - description: This is the number of items per page to return.
          in: query
          name: page_size
          schema:
            default: 250
            format: int64
            maximum: 1000
            minimum: 1
            type: integer
        - description: The next page token.
          in: query
          name: page_token
          schema:
            type: string
        - description: |-
            Status filters out messages based on status.
            If no value is provided, it doesn't take effect on filter.
          in: query
          name: status
          schema:
            $ref: "#/components/schemas/CourierMessageStatus"
        - description: |-
            Recipient filters out messages based on recipient.
            If no value is provided, it doesn't take effect on filter.
          in: query
          name: recipient
          schema:
            type: string
      responses:
        "200":
          description: Paginated Courier Message List Response
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Message"
                type: array
        "400":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
      summary: List Messages
      tags:
        - fluffly
  "/courier/messages/{id}":
    get:
      description: Gets a specific messages by the given ID.
      operationId: getCourierMessage
      parameters:
        - description: MessageID is the ID of the message.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
          description: message
        "400":
          $ref: "#/components/responses/GenericError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
      summary: Get a Message
      tags:
        - fluffly
  /identities:
    get:
      description: >-
        Lists all
        [identities](https://www.ory.sh/docs/kratos/concepts/identity-user-model)
        in the system. Note: filters cannot be combined.
      operationId: listIdentities
      parameters:
        - description: Page Size
          in: query
          name: page_size
          schema:
            default: 250
            format: int64
            maximum: 500
            minimum: 1
            type: integer
        - description: Next Page Token
          in: query
          name: page_token
          schema:
            default: "1"
            minimum: 1
            type: string
        - description: Read Consistency Level (cloud only)
          in: query
          name: consistency
          schema:
            type: string
            enum:
              - strong
              - eventual
        - description: >-
            Retrieve multiple identities by their IDs.

            This parameter has the following limitations:

            Duplicate or non-existent IDs are ignored.

            The order of returned IDs may be different from the request.

            This filter does not support pagination. You must implement your own
            pagination as the maximum number of items returned by this endpoint
            may not exceed a certain threshold (currently 500).
          in: query
          name: ids
          schema:
            items:
              type: string
            type: array
        - description: >-
            CredentialsIdentifier is the identifier (username, email) of the
            credentials to look up using exact match.

            Only one of CredentialsIdentifier and CredentialsIdentifierSimilar
            can be used.
          in: query
          name: credentials_identifier
          schema:
            type: string
        - description: >-
            This is an EXPERIMENTAL parameter that WILL CHANGE. Do NOT rely on
            consistent, deterministic behavior.

            THIS PARAMETER WILL BE REMOVED IN AN UPCOMING RELEASE WITHOUT ANY
            MIGRATION PATH.

            CredentialsIdentifierSimilar is the (partial) identifier (username,
            email) of the credentials to look up using similarity search.

            Only one of CredentialsIdentifier and CredentialsIdentifierSimilar
            can be used.
          in: query
          name: preview_credentials_identifier_similar
          schema:
            type: string
        - description: >-
            Include Credentials in Response

            Include any credential, for example `password` or `oidc`, in the
            response. When set to `oidc`, This will return

            the initial OAuth 2.0 Access Token, OAuth 2.0 Refresh Token and the
            OpenID Connect ID Token if available.
          in: query
          name: include_credential
          schema:
            items:
              type: string
            type: array
        - description: List identities that belong to a specific organization.
          in: query
          name: organization_id
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Identity"
                type: array
          description: Paginated Identity List Response
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: List Identities
      tags:
        - fluffly
    patch:
      description: >-
        Creates multiple

        [identities](https://www.ory.sh/docs/kratos/concepts/identity-user-model).

        This endpoint can also be used to [import

        credentials](https://www.ory.sh/docs/kratos/manage-identities/import-user-accounts-identities)

        for instance passwords, social sign in configurations or multifactor
        methods.
      operationId: batchPatchIdentities
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchIdentitiesBody"
        x-originalParamName: Body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPatchIdentitiesResponse"
          description: batchPatchIdentitiesResponse
        "400":
          $ref: "#/components/responses/GenericError"
        "409":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Create multiple identities
      tags:
        - fluffly
    post:
      description: >-
        Create an
        [identity](https://www.ory.sh/docs/kratos/concepts/identity-user-model).
        This endpoint can also be used to

        [import
        credentials](https://www.ory.sh/docs/kratos/manage-identities/import-user-accounts-identities)

        for instance passwords, social sign in configurations or multifactor
        methods.
      operationId: createIdentity
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIdentityBody"
        x-originalParamName: Body
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
          description: identity
        "400":
          $ref: "#/components/responses/GenericError"
        "409":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Create an Identity
      tags:
        - fluffly
  "/identities/{id}":
    delete:
      description: >-
        Calling this endpoint irrecoverably and permanently deletes the
        [identity](https://www.ory.sh/docs/kratos/concepts/identity-user-model)
        given its ID. This action can not be undone.

        This endpoint returns 204 when the identity was deleted or when the
        identity was not found, in which case it is

        assumed that is has been deleted already.
      operationId: deleteIdentity
      parameters:
        - description: ID is the identity's ID.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Delete an Identity
      tags:
        - fluffly
    get:
      description: >-
        Return an
        [identity](https://www.ory.sh/docs/kratos/concepts/identity-user-model)
        by its ID. You can optionally

        include credentials (e.g. social sign in connections) in the response by
        using the `include_credential` query parameter.
      operationId: getIdentity
      parameters:
        - description: ID must be set to the ID of identity you want to get
          in: path
          name: id
          required: true
          schema:
            type: string
        - description: >-
            Include Credentials in Response

            Include any credential, for example `password` or `oidc`, in the
            response. When set to `oidc`, This will return

            the initial OAuth 2.0 Access Token, OAuth 2.0 Refresh Token and the
            OpenID Connect ID Token if available.
          in: query
          name: include_credential
          schema:
            items:
              enum:
                - password
                - oidc
                - totp
                - lookup_secret
                - webauthn
                - code
                - passkey
                - profile
                - saml
                - link_recovery
                - code_recovery
              type: string
            type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
          description: identity
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Get an Identity
      tags:
        - fluffly
    patch:
      description: >-
        Partially updates an
        [identity's](https://www.ory.sh/docs/kratos/concepts/identity-user-model)
        field using [JSON Patch](https://jsonpatch.com/).

        The fields `id`, `stateChangedAt` and `credentials` can not be updated
        using this method.
      operationId: patchIdentity
      parameters:
        - description: ID must be set to the ID of identity you want to update
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonPatchDocument"
        x-originalParamName: Body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
          description: identity
        "400":
          $ref: "#/components/responses/GenericError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Patch an Identity
      tags:
        - fluffly
    put:
      description: >-
        This endpoint updates an
        [identity](https://www.ory.sh/docs/kratos/concepts/identity-user-model).
        The full identity

        payload (except credentials) is expected. It is possible to update the
        identity's credentials as well.
      operationId: updateIdentity
      parameters:
        - description: ID must be set to the ID of identity you want to update
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIdentityBody"
        x-originalParamName: Body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
          description: identity
        "400":
          $ref: "#/components/responses/GenericError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Update an Identity
      tags:
        - fluffly
  "/identities/{id}/credentials/{type}":
    delete:
      description: >-
        Delete an
        [identity](https://www.ory.sh/docs/kratos/concepts/identity-user-model)
        credential by its type.

        You cannot delete password or code auth credentials through this API.
      operationId: deleteIdentityCredentials
      parameters:
        - description: ID is the identity's ID.
          in: path
          name: id
          required: true
          schema:
            type: string
        - description: >-
            Type is the type of credentials to delete.

            password CredentialsTypePassword

            oidc CredentialsTypeOIDC

            totp CredentialsTypeTOTP

            lookup_secret CredentialsTypeLookup

            webauthn CredentialsTypeWebAuthn

            code CredentialsTypeCodeAuth

            passkey CredentialsTypePasskey

            profile CredentialsTypeProfile

            saml CredentialsTypeSAML

            link_recovery CredentialsTypeRecoveryLink
            CredentialsTypeRecoveryLink is a special credential type linked to
            the link strategy (recovery flow).  It is not used within the
            credentials object itself.

            code_recovery CredentialsTypeRecoveryCode
          in: path
          name: type
          required: true
          schema:
            enum:
              - password
              - oidc
              - totp
              - lookup_secret
              - webauthn
              - code
              - passkey
              - profile
              - saml
              - link_recovery
              - code_recovery
            type: string
        - description: >-
            Identifier is the identifier of the OIDC credential to delete.

            Find the identifier by calling the `GET
            /identities/{id}?include_credential=oidc` endpoint.
          in: query
          name: identifier
          schema:
            type: string
      responses:
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Delete a credential for a specific identity
      tags:
        - fluffly
  "/identities/{id}/sessions":
    delete:
      description: >-
        Calling this endpoint irrecoverably and permanently deletes and
        invalidates all sessions that belong to the given Identity.
      operationId: deleteIdentitySessions
      parameters:
        - description: ID is the identity's ID.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/UnexpectedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Delete & Invalidate an Identity's Sessions
      tags:
        - fluffly
    get:
      description: This endpoint returns all sessions that belong to the given Identity.
      operationId: listIdentitySessions
      parameters:
        - description: >-
            Page Size

            This is the number of items per page to return. For details on
            pagination please head over to the

            [pagination
            documentation](https://www.ory.sh/docs/ecosystem/api-design#pagination).
          in: query
          name: page_size
          schema:
            default: 250
            format: int64
            maximum: 500
            minimum: 1
            type: integer
        - description: >-
            Next Page Token

            The next page token. For details on pagination please head over to
            the

            [pagination
            documentation](https://www.ory.sh/docs/ecosystem/api-design#pagination).
          in: query
          name: page_token
          schema:
            default: "1"
            minimum: 1
            type: string
        - description: ID is the identity's ID.
          in: path
          name: id
          required: true
          schema:
            type: string
        - description: >-
            Active is a boolean flag that filters out sessions based on the
            state. If no value is provided, all sessions are returned.
          in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Session"
                type: array
          description: List Identity Sessions Response
        "400":
          $ref: "#/components/responses/GenericError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: List an Identity's Sessions
      tags:
        - fluffly
  /sessions:
    get:
      description: Listing all sessions that exist.
      operationId: listSessions
      parameters:
        - description: >-
            Items per Page

            This is the number of items per page to return.

            For details on pagination please head over to the [pagination
            documentation](https://www.ory.sh/docs/ecosystem/api-design#pagination).
          in: query
          name: page_size
          schema:
            default: 250
            format: int64
            maximum: 1000
            minimum: 1
            type: integer
        - description: >-
            Next Page Token

            The next page token.

            For details on pagination please head over to the [pagination
            documentation](https://www.ory.sh/docs/ecosystem/api-design#pagination).
          in: query
          name: page_token
          schema:
            type: string
        - description: >-
            Active is a boolean flag that filters out sessions based on the
            state. If no value is provided, all sessions are returned.
          in: query
          name: active
          schema:
            type: boolean
        - description: >-
            ExpandOptions is a query parameter encoded list of all properties
            that must be expanded in the Session.

            If no value is provided, the expandable properties are skipped.
          in: query
          name: expand
          schema:
            items:
              enum:
                - identity
                - devices
              type: string
            type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Session"
                type: array
          description: >-
            Session List Response

            The response given when listing sessions in an administrative
            context.
        "400":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: List All Sessions
      tags:
        - fluffly
  "/sessions/{id}":
    delete:
      description: >-
        Calling this endpoint deactivates the specified session. Session data is
        not deleted.
      operationId: disableSession
      parameters:
        - description: ID is the session's ID.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "400":
          $ref: "#/components/responses/GenericError"
        "401":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Deactivate a Session
      tags:
        - fluffly
    get:
      description: >-
        This endpoint is useful for:

        Getting a session object with all specified expandables that exist in an
        administrative context.
      operationId: getSession
      parameters:
        - description: >-
            ExpandOptions is a query parameter encoded list of all properties
            that must be expanded in the Session.

            Example - ?expand=Identity&expand=Devices

            If no value is provided, the expandable properties are skipped.
          in: query
          name: expand
          schema:
            items:
              enum:
                - identity
                - devices
              type: string
            type: array
        - description: ID is the session's ID.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
          description: session
        "400":
          $ref: "#/components/responses/GenericError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Get Session
      tags:
        - fluffly
  "/sessions/{id}/extend":
    patch:
      description: >-
        Calling this endpoint extends the given session ID. If
        `session.earliest_possible_extend` is set it

        will only extend the session after the specified time has passed.

        This endpoint returns per default a 204 No Content response on success.
        Older Ory Network projects may

        return a 200 OK response with the session in the body. Returning the
        session as part of the response

        will be deprecated in the future and should not be relied upon.

        This endpoint ignores consecutive requests to extend the same session
        and returns a 404 error in those

        scenarios. This endpoint also returns 404 errors if the session does not
        exist.

        Retrieve the session ID from the `/sessions/whoami` endpoint /
        `toSession` SDK method.
      operationId: extendSession
      parameters:
        - description: ID is the session's ID.
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
          description: session
        "204":
          $ref: "#/components/responses/EmptyResponse"
        "400":
          $ref: "#/components/responses/GenericError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Extend a Session
      tags:
        - fluffly
  /recovery/code:
    post:
      description: >-
        This endpoint creates a recovery code which should be given to the user
        in order for them to recover

        (or activate) their account.
      operationId: createRecoveryCodeForIdentity
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecoveryCodeForIdentityBody"
        x-originalParamName: Body
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryCodeForIdentity"
          description: recoveryCodeForIdentity
        "400":
          $ref: "#/components/responses/GenericError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Create a Recovery Code
      tags:
        - fluffly
  /recovery/link:
    post:
      description: >-
        This endpoint creates a recovery link which should be given to the user
        in order for them to recover

        (or activate) their account.
      operationId: createRecoveryLinkForIdentity
      parameters:
        - in: query
          name: return_to
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecoveryLinkForIdentityBody"
        x-originalParamName: Body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryLinkForIdentity"
          description: recoveryLinkForIdentity
        "400":
          $ref: "#/components/responses/GenericError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        default:
          $ref: "#/components/responses/UnexpectedError"
          description: errorGeneric
      summary: Create a Recovery Link
      tags:
        - fluffly
