            belongs to.

            default DefaultGroup

            password PasswordGroup

            oidc OpenIDConnectGroup

            profile ProfileGroup

            link LinkGroup

            code CodeGroup

            totp TOTPGroup

            lookup_secret LookupGroup

            webauthn WebAuthnGroup

            passkey PasskeyGroup

            identifier_first IdentifierFirstGroup

            captcha CaptchaGroup

            saml SAMLGroup
          enum:
            - default
            - password
            - oidc
            - profile
            - link
            - code
            - totp
            - lookup_secret
            - webauthn
            - passkey
            - identifier_first
            - captcha
            - saml
            - oauth2_consent
          type: string
        messages:
          $ref: "#/components/schemas/UiTexts"
        meta:
          $ref: "#/components/schemas/UiNodeMeta"
        type:
          description: |-
            The node's type
            text Text
            input Input
            img Image
            a Anchor
            script Script
            div Division
          enum:
            - text
            - input
            - img
            - a
            - script
            - div
          type: string
      required:
        - type
        - group
        - attributes
        - messages
        - meta
      title: Node represents a flow's nodes
      type: object
    UiNodeAnchorAttributes:
      properties:
